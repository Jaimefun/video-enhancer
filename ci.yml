name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & type-check ───────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check app/

      - name: Mypy type check
        run: mypy app/ --ignore-missing-imports --no-strict-optional

  # ── Unit tests ──────────────────────────────────────────────────────────────
  test:
    name: Tests (CPU / mock GPU)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python deps (CPU-only torch)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          MODEL_PATH: weights/.gitkeep   # mock path; GPU init falls back to mock
        run: pytest tests/ -v --tb=short

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build (no GPU push)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: video-enhancer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
